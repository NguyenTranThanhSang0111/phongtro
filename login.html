<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - PhongTroDB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .login-container { margin-top: 100px; max-width: 400px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card login-container shadow-sm p-4 w-100">
        <h3 class="text-center mb-4">Đăng Nhập</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Tài khoản</label>
                <input type="text" class="form-control" id="username" placeholder="Nhập tài khoản" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            <div class="mb-3 text-end">
        <small>Chưa có tài khoản? <a href="register.html" class="text-primary fw-bold">Đăng ký ngay</a></small>
    </div>
            
            <button type="submit" class="btn btn-primary w-100">Vào hệ thống</button>
        </form>
        
        <div class="mt-3 text-center">
            <a href="index.html" class="text-decoration-none">← Quay lại trang chủ</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const inputUser = document.getElementById('username').value;
        const inputPass = document.getElementById('password').value;

        // 1. Danh sách Admin mặc định (không thay đổi)
        const defaultUsers = [
            { username: "chu_tro", password: "1", role: "landlord" },
            { username: "admin", password: "1", role: "admin" }
        ];

        // 2. Lấy danh sách người dùng mới từ localStorage
        const localUsers = JSON.parse(localStorage.getItem('userList')) || [];

        // 3. Gộp cả 2 danh sách lại để kiểm tra
        const allUsers = [...defaultUsers, ...localUsers];

        // 4. Tìm tài khoản khớp
        const user = allUsers.find(u => u.username === inputUser && u.password === inputPass);

        if (user) {
            localStorage.setItem('userRole', user.role);
            localStorage.setItem('currentUser', user.username);
            
            alert(`Chào mừng ${user.username}!`);
            window.location.href = user.role + '.html'; 
        } else {
            alert("Tài khoản hoặc mật khẩu không đúng!");
        }
    });
</script>

</body>
</html>
