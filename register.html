<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - PhongTroDB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .register-container { margin-top: 80px; max-width: 450px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card register-container shadow-sm p-4 w-100">
        <h3 class="text-center mb-4">Tạo Tài Khoản</h3>
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" id="regUsername" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="regPassword" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Bạn là ai?</label>
                <select class="form-select" id="regRole">
                    <option value="tenant">Khách tìm phòng</option>
                    <option value="landlord">Chủ cho thuê</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100">Đăng ký</button>
        </form>
        <div class="mt-3 text-center">
            <a href="login.html" class="text-decoration-none">Đã có tài khoản? Đăng nhập</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const role = document.getElementById('regRole').value;

        // 1. Lấy danh sách tài khoản đã có (nếu chưa có thì tạo mảng rỗng)
        // Dùng JSON.parse để biến chuỗi văn bản từ localStorage thành mảng lại
        let users = JSON.parse(localStorage.getItem('userList')) || [];

        // 2. Kiểm tra xem tên đăng nhập đã tồn tại chưa
        const isExisted = users.some(u => u.username === username);
        if (isExisted) {
            alert("Tên đăng nhập này đã tồn tại!");
            return;
        }

        // 3. Thêm tài khoản mới vào mảng
        users.push({ username, password, role });

        // 4. Lưu mảng mới vào localStorage (phải dùng JSON.stringify để biến mảng thành chuỗi)
        localStorage.setItem('userList', JSON.stringify(users));

        alert("Đăng ký thành công!");
        window.location.href = 'login.html'; // Chuyển về trang đăng nhập
    });
</script>

</body>
</html>
